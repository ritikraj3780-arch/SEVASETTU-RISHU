<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bihar Scholarship Test - Seva Settu</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--blue:#0a192f;
--gold:#fbbf24;
}

body{
margin:0;
font-family:Segoe UI;
background:#f8fafc;
}

/* HEADER */
header{
background:var(--blue);
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}
.brand{
color:var(--gold);
font-weight:800;
}

/* SLIDER */
.slider{
position:relative;
background:black;
}
.slide{
width:100%;
display:none;
}
.slide.active{
display:block;
}

/* HERO */
.hero{
background:var(--blue);
color:white;
text-align:center;
padding:20px;
}
.hero h1{
color:var(--gold);
margin:0;
}

/* CARD */
.card{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* BUTTON */
.sticky{
position:fixed;
bottom:15px;
width:100%;
display:flex;
justify-content:center;
}
.btn{
background:linear-gradient(90deg,#fbbf24,#f59e0b);
border:none;
padding:15px 40px;
border-radius:50px;
font-weight:bold;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:flex-end;
}
.modal-content{
background:white;
width:100%;
padding:20px;
border-radius:20px 20px 0 0;
}

input,select{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:6px;
}

.submit{
background:var(--blue);
color:white;
padding:14px;
width:100%;
border:none;
font-weight:bold;
}

/* WhatsApp */
.whatsapp{
position:fixed;
right:15px;
bottom:80px;
background:#25d366;
color:white;
padding:12px;
border-radius:50%;
font-size:20px;
}
</style>
</head>

<body>

<header>
<div class="brand">SEVA SETTU</div>
<a href="https://wa.me/918789846368" style="color:white;">Support</a>
</header>

<!-- SLIDER -->
<div class="slider">
<img src="banner1.jpg" class="slide active">
<img src="banner2.jpg" class="slide">
<img src="banner3.jpg" class="slide">
</div>

<!-- HERO -->
<div class="hero">
<h1>Bihar Scholarship Test</h1>
<p>Class 6 to 12 Students</p>
</div>

<!-- INFO -->
<div class="card">
<h3>Exam Info</h3>
<p>Mode: Online & Offline</p>
<p>Fee: ₹199 (Non-refundable)</p>
<p>After payment, our team will contact you on WhatsApp within 24 hours.</p>
</div>

<!-- SYLLABUS -->
<div class="card">
<h3>Syllabus</h3>
<a href="syallabus.pdf">Download PDF</a>
</div>

<!-- STICKY BUTTON -->
<div class="sticky">
<button class="btn" onclick="openForm()">Register Now ₹199</button>
</div>

<!-- MODAL FORM -->
<div class="modal" id="modal">
<div class="modal-content">
<span onclick="closeForm()" style="float:right;font-size:22px;">×</span>

<h3>Register</h3>

<form id="form">
<input type="text" name="Name" placeholder="Student Name" required>
<input type="text" name="Father" placeholder="Father Name" required>
<input type="text" name="School" placeholder="School Name" required>

<select name="Class">
<option>Class</option>
<option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option><option>11</option><option>12</option>
</select>

<input type="tel" name="Mobile" placeholder="WhatsApp Number" required>

<button type="submit" class="submit">Proceed to Payment</button>
</form>

</div>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/918789846368" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

<script>

/* SLIDER */
let slides=document.querySelectorAll('.slide');
let i=0;
setInterval(()=>{
slides[i].classList.remove('active');
i=(i+1)%slides.length;
slides[i].classList.add('active');
},3000);

/* MODAL */
function openForm(){document.getElementById("modal").style.display="flex";}
function closeForm(){document.getElementById("modal").style.display="none";}

/* FORM SUBMIT */
document.getElementById("form").addEventListener("submit",function(e){
e.preventDefault();

fetch("https://formsubmit.co/ajax/90plusacademy.official@gmail.com",{
method:"POST",
body:new FormData(this)
}).then(()=>{
window.location.href="https://rzp.io/rzp/TpRx4Pya";
});
});

</script>

</body>
</html>
