
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SevaSettu Scholarship Test</title>

<style>
:root{
  --blue:#0a192f;
  --gold:#fbbf24;
  --green:#22c55e;
}

body{
  margin:0;
  font-family:Segoe UI;
  background:#f8fafc;
}

/* TOP BAR */
.top-bar{
  background:red;
  color:#fff;
  text-align:center;
  padding:6px;
  font-size:12px;
  font-weight:bold;
}

/* SLIDER */
.slider{
  position:relative;
  height:60vh;
  overflow:hidden;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:0.5s;
}

.slide.active{opacity:1;}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

/* LOGO */
.logo{
  position:absolute;
  top:10px;
  left:10px;
  width:50px;
  height:50px;
  border-radius:50%;
  border:2px solid gold;
  overflow:hidden;
  z-index:10;
}

.logo img{width:100%;height:100%;object-fit:cover;}

/* HERO TEXT */
.hero{
  position:absolute;
  bottom:20px;
  text-align:center;
  width:100%;
  color:#fff;
  z-index:10;
}

.hero h1{
  color:var(--gold);
  font-size:22px;
  margin:0;
}

.hero p{
  font-size:14px;
}

/* BUTTONS */
.btn{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  width:80%;
}

.register{background:var(--gold);}
.donate{background:var(--green);color:#fff;}

/* CARD */
.card{
  background:#fff;
  margin:15px;
  padding:15px;
  border-radius:12px;
}

/* FORM */
input,select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
}

.submit{
  background:var(--blue);
  color:#fff;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:20px;
  border-radius:20px 20px 0 0;
}
</style>
</head>

<body>

<div class="top-bar">
🔥 Limited Seats | <span id="timer"></span>
</div>

<div class="slider">

<div class="overlay"></div>

<div class="logo">
<img src="logo.png">
</div>

<img src="banner1.jpg" class="slide active">
<img src="banner2.jpg" class="slide">
<img src="banner3.jpg" class="slide">
<img src="banner4.jpg" class="slide">
<img src="banner5.jpg" class="slide">

<div class="hero">
<h1>Bihar Scholarship Test</h1>
<p>Win ₹50,000 + Free Coaching</p>

<button class="btn register" onclick="openForm()">Register ₹199</button>
<button class="btn donate" onclick="donate()">Donate ❤️</button>
</div>

</div>

<div class="card">
<h3>Exam Details</h3>
<p>Date: 7 June 2026</p>
<p>Time: 10 AM – 12 PM</p>
<p>Eligibility: Class 6–12</p>
<p>Mode: Online + Offline</p>
<p>Fee: ₹199</p>
</div>

<div class="card">
<a href="syallabus.pdf" target="_blank">Download Syllabus</a>
</div>

<!-- FORM -->
<div id="form" class="modal">

<h3>Register</h3>

<form id="f">

<input type="text" placeholder="Student Name" required>
<input type="text" placeholder="Father Name" required>
<input type="text" placeholder="School & City" required>

<select required>
<option value="">Class</option>
<option>6</option><option>7</option>
<option>8</option><option>9</option>
<option>10</option><option>11</option>
<option>12</option>
</select>

<select required>
<option value="">Mode</option>
<option>Online</option>
<option>Offline (School)</option>
</select>

<input type="tel" pattern="[0-9]{10}" placeholder="Mobile Number" required>

<button class="btn submit">Submit & Pay</button>

</form>
</div>

<script>

/* TIMER */
var end=new Date("June 7, 2026").getTime();
setInterval(()=>{
let now=new Date().getTime();
let d=end-now;
let days=Math.floor(d/(1000*60*60*24));
document.getElementById("timer").innerHTML=days+" Days Left";
},1000);

/* SLIDER */
let i=0;
let slides=document.querySelectorAll(".slide");

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

/* FORM */
function openForm(){
document.getElementById("form").style.display="block";
}

/* PAYMENT */
document.getElementById("f").addEventListener("submit",function(e){
e.preventDefault();
window.location.href="https://rzp.io/rzp/TpRx4Pya";
});

/* DONATE */
function donate(){
window.location.href="https://rzp.io/rzp/GMMGxh98";
}

</script>

</body>
</html>
